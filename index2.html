<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى أعظم ملكة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --pink: #ff4d6d; }
        body { margin: 0; background: #000; font-family: 'Cairo', sans-serif; color: white; overflow-x: hidden; }

        /* شاشة الدخول */
        #lock-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #2c0514, #000);
            z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pass-input { padding: 15px; border-radius: 10px; border: 2px solid var(--gold); background: none; color: white; text-align: center; font-size: 1.2rem; margin-bottom: 15px; }
        .btn-open { background: var(--gold); border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--gold); }

        /* الصندوق */
        #world { display: none; padding-top: 50px; }
        .box-container { height: 300px; display: flex; justify-content: center; align-items: center; perspective: 1000px; }
        .gift-box { width: 120px; height: 120px; position: relative; transform-style: preserve-3d; animation: rot 10s infinite linear; cursor: pointer; }
        .gift-box div { position: absolute; width: 120px; height: 120px; background: #5e0d0d; border: 2px solid var(--gold); display: flex; justify-content: center; align-items: center; font-size: 50px; }
        .front { transform: translateZ(60px); } .back { transform: rotateY(180deg) translateZ(60px); }
        .top { transform: rotateX(90deg) translateZ(60px); background: var(--pink) !important; }
        .bottom { transform: rotateX(-90deg) translateZ(60px); }
        .right { transform: rotateY(90deg) translateZ(60px); } .left { transform: rotateY(-90deg) translateZ(60px); }
        @keyframes rot { from { transform: rotateX(0) rotateY(0); } to { transform: rotateX(360deg) rotateY(360deg); } }

        /* المحتوى المضاف */
        .long-scroll { width: 90%; max-width: 500px; margin: 0 auto; background: #fff9f0; border-radius: 20px; color: #2c0514; padding: 25px; display: none; box-shadow: 0 -10px 50px rgba(0,0,0,0.5); }
        .title { text-align: center; font-family: 'Amiri', serif; font-size: 2rem; color: #5e0d0d; border-bottom: 2px double var(--gold); margin-bottom: 30px; }
        .story-item { margin-bottom: 40px; text-align: center; }
        .story-img { width: 100%; border-radius: 15px; border: 3px solid var(--gold); }
        .story-text { font-family: 'Amiri', serif; font-size: 1.4rem; line-height: 1.8; margin-top: 15px; text-align: justify; }
        
        .floating-heart { position: fixed; pointer-events: none; animation: floatUp 4s linear forwards; z-index: 9999; }
        @keyframes floatUp { 0% { transform: translateY(100vh); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(-10vh); opacity: 0; } }
    </style>
</head>
<body>

<audio id="momSong" loop><source src="Project Name.mp3" type="audio/mpeg"></audio>

<div id="lock-screen">
    <h1 style="color: var(--gold); text-align: center;">مرحباً يا ملكتي ❤️</h1>
    <input type="password" id="userPass" class="pass-input" placeholder="كلمة السر...">
    <button class="btn-open" onclick="checkPassword()">افتحي المفاجأة ✨</button>
</div>

<div id="world">
    <div class="box-container" id="boxArea">
        <div class="gift-box" onclick="openBox()">
            <div class="front">🎁</div><div class="back">🌸</div>
            <div class="top">🎀</div><div class="bottom">👑</div>
            <div class="right">✨</div><div class="left">❤️</div>
        </div>
    </div>

    <div class="long-scroll" id="scrollContent">
        <div class="title" id="displayTitle"></div>
        <div id="albumArea"></div>
        <p style="text-align: center; font-size: 1.5rem; color: #ff4d6d;">بنحبك يا ست الكل ❤️</p>
    </div>
</div>

<script>
    let giftData = null;

    function checkPassword() {
        giftData = JSON.parse(localStorage.getItem('momGiftData'));
        const entered = document.getElementById('userPass').value;
        const correct = giftData ? giftData.password : "1234";

        if (entered === correct) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('world').style.display = 'block';
            document.getElementById('momSong').play();
            startHearts();
        } else {
            alert("كلمة السر خطأ!");
        }
    }

    function openBox() {
        document.getElementById('boxArea').style.display = 'none';
        const scroll = document.getElementById('scrollContent');
        scroll.style.display = 'block';
        
        // تعبئة البيانات
        document.getElementById('displayTitle').innerText = giftData.title;
        const area = document.getElementById('albumArea');
        area.innerHTML = "";
        
        giftData.album.forEach(item => {
            area.innerHTML += `
                <div class="story-item">
                    <img src="${item.img}" class="story-img">
                    <div class="story-text">${item.text}</div>
                </div>
            `;
        });
    }

    function startHearts() {
        setInterval(() => {
            const h = document.createElement('div');
            h.className = 'floating-heart';
            h.innerHTML = ["❤️", "🌸", "✨"][Math.floor(Math.random()*3)];
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 20 + 20) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }, 500);
    }
</script>
</body>
</html>
