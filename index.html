<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالمنا الخاص ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* شاشة الدخول */
        #intro {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .heart-btn {
            font-size: 80px; cursor: pointer; animation: pulse 1.5s infinite; filter: drop-shadow(0 0 20px var(--accent));
        }

        /* العالم الـ 3D */
        #universe {
            position: relative; width: 100vw; height: 100vh; perspective: 1000px; display: none;
        }

        #cylinder {
            position: absolute; width: 100%; height: 100%; transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .photo-card {
            position: absolute; width: 150px; height: 200px; left: 50%; top: 40%;
            margin-left: -75px; border: 3px solid #fff; border-radius: 10px;
            box-shadow: 0 0 15px var(--accent); overflow: hidden;
            transition: transform 0.2s; /* لجعل الهز ناعماً */
        }

        .photo-card img { width: 100%; height: 100%; object-fit: cover; }

        /* تأثير الهزة (Shake Animation) */
        @keyframes jitter {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(5px, 5px) rotate(5deg); }
            50% { transform: translate(-5px, -5px) rotate(-5deg); }
            75% { transform: translate(5px, -5px) rotate(2deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .shaking { animation: jitter 0.2s infinite !important; }

        /* لوحة الكلام الواضحة */
        .speech-box {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 80%; background: rgba(0,0,0,0.85); border: 1px solid var(--accent);
            padding: 20px; border-radius: 20px; text-align: center; z-index: 100;
            direction: rtl; backdrop-filter: blur(10px);
        }

        #love-text { font-size: 20px; color: #fff; margin: 0; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body>

    <div id="intro" onclick="startExperience()">
        <div class="heart-btn">❤️</div>
        <h2 style="color:var(--accent); margin-top:20px;">اضغطي هنا يا حبيبتي</h2>
        <p style="color:#666; font-size:12px;">(هزي الموبايل لما تفتحي الصور!)</p>
    </div>

    <div id="universe">
        <div id="cylinder"></div>
        <div class="speech-box">
            <p id="love-text">جاري تحضير المفاجأة...</p>
        </div>
    </div>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. صورك
        const images = [
            'https://picsum.photos/300/400?random=1',
            'https://picsum.photos/300/400?random=2',
            'https://picsum.photos/300/400?random=3',
            'https://picsum.photos/300/400?random=4',
            'https://picsum.photos/300/400?random=5',
            'https://picsum.photos/400/500?random=6',
            'https://picsum.photos/400/500?random=7',
            'https://picsum.photos/400/500?random=8'
        ];

        // 2. كلامك
        const messages = [
            "أهلاً بكِ في عالمكِ الخاص ❤️",
            "هزي الموبايل وشوفي الصور بتعمل إيه!",
            "كل صورة هي لحظة غالية في عمري..",
            "انتي الوحيدة اللي في قلبي ودنيتي..",
            "بحبك النهاردة، وبكرة، وللأبد..",
            "مقدرش أعيش من غير ضحكتك دي."
        ];

        let canShake = false;

        async function startExperience() {
            // طلب إذن حساسات الحركة (خاص بالآيفون)
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') { canShake = true; }
                } catch (e) { console.error(e); }
            } else {
                canShake = true; // للأندرويد يعمل مباشرة
            }

            document.getElementById('intro').style.display = 'none';
            document.getElementById('universe').style.display = 'block';
            document.getElementById('music').play();
            
            initPhotos();
            startText();
            if (canShake) listenToShake();
        }

        function initPhotos() {
            const cylinder = document.getElementById('cylinder');
            const total = 12; // عدد الصور الكلي
            for (let i = 0; i < total; i++) {
                const card = document.createElement('div');
                card.className = 'photo-card';
                const img = document.createElement('img');
                img.src = images[i % images.length];
                card.appendChild(img);
                
                const angle = (i / total) * 360;
                card.style.transform = `rotateY(${angle}deg) translateZ(400px)`;
                cylinder.appendChild(card);
            }
            // دوران الأسطوانة التلقائي
            let rotation = 0;
            setInterval(() => {
                rotation += 0.2;
                cylinder.style.transform = `rotateY(${rotation}deg)`;
            }, 16);
        }

        function startText() {
            let i = 0;
            setInterval(() => {
                document.getElementById('love-text').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('love-text').innerText = messages[i % messages.length];
                    document.getElementById('love-text').style.opacity = 1;
                    i++;
                }, 500);
            }, 4000);
        }

        // ميزة "هز الموبايل"
        function listenToShake() {
            let lastX, lastY, lastZ;
            let threshold = 15; // قوة الهزة المطلوبة

            window.addEventListener('devicemotion', (event) => {
                let acc = event.accelerationIncludingGravity;
                if (!acc.x) return;

                let deltaX = Math.abs(acc.x - lastX);
                let deltaY = Math.abs(acc.y - lastY);
                let deltaZ = Math.abs(acc.z - lastZ);

                if (deltaX + deltaY + deltaZ > threshold) {
                    // إذا حدث هز، أضف كلاس "shaking" لكل الصور
                    const cards = document.querySelectorAll('.photo-card');
                    cards.forEach(c => c.classList.add('shaking'));
                    
                    // إيقاف الهز بعد ثانية
                    setTimeout(() => {
                        cards.forEach(c => c.classList.remove('shaking'));
                    }, 1000);
                }

                lastX = acc.x;
                lastY = acc.y;
                lastZ = acc.z;
            });
        }
    </script>
</body>
</html>
