<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - ألبوم ست الحبايب</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdf2f4; padding: 20px; direction: rtl; text-align: right; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #ff4d6d; text-align: center; }
        .config-group { background: #fff0f3; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ffccd5; }
        .section-item { border: 2px solid #eee; padding: 15px; margin: 15px 0; border-radius: 10px; position: relative; }
        input[type="text"], input[type="password"], textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-add { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-save { background: #ff4d6d; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 1.1rem; margin-top: 20px; font-weight: bold; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; position: absolute; left: 10px; top: 10px; }
        .preview-img { width: 100%; max-height: 200px; object-fit: contain; margin: 10px 0; display: none; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ تجهيز مفاجأة أمي</h2>
    
    <div class="config-group">
        <label>🔐 كلمة السر للدخول:</label>
        <input type="text" id="giftPassword" placeholder="مثلاً: 1234">
        
        <label>👑 العنوان الرئيسي:</label>
        <input type="text" id="mainTitle" placeholder="مثلاً: حكاية أعظم أم في العالم">
    </div>

    <div id="sectionsList">
        <!-- الأقسام ستضاف هنا تلقائياً -->
    </div>

    <button class="btn-add" onclick="addBlankSection()">➕ إضافة صورة وكلام جديد</button>
    <button class="btn-save" onclick="saveEverything()">حفظ ونشر المفاجأة ✨</button>
</div>

<script>
    // دالة لإضافة قسم جديد (صورة + نص)
    function addBlankSection(savedImg = "", savedText = "") {
        const id = Date.now();
        const html = `
            <div class="section-item" id="item_${id}">
                <button class="btn-delete" onclick="document.getElementById('item_${id}').remove()">حذف</button>
                <label>اختر صورة:</label>
                <input type="file" accept="image/*" onchange="previewImg(this, ${id})">
                <img id="prev_${id}" src="${savedImg}" class="preview-img" style="${savedImg ? 'display:block' : ''}">
                <textarea id="text_${id}" placeholder="اكتب الكلام الذي يظهر تحت هذه الصورة..." rows="3">${savedText}</textarea>
            </div>
        `;
        document.getElementById('sectionsList').insertAdjacentHTML('beforeend', html);
    }

    // معاينة الصورة عند اختيارها
    function previewImg(input, id) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById('prev_' + id);
            img.src = e.target.result;
            img.style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
    }

    // حفظ كل البيانات في المتصفح
    async function saveEverything() {
    const token = document.getElementById('ghToken').value;
    if (!token) return alert("من فضلك أدخل GitHub Token أولاً!");

    const sections = [];
    const items = document.querySelectorAll('.section-item');
    
    items.forEach(item => {
        const id = item.id.split('_')[1];
        const imgSrc = document.getElementById('prev_' + id).src;
        const textVal = document.getElementById('text_' + id).value;
        if (imgSrc.startsWith('data:image') || imgSrc.startsWith('http')) {
            sections.push({ img: imgSrc, text: textVal });
        }
    });

    const data = {
        password: document.getElementById('giftPassword').value || "1234",
        title: document.getElementById('mainTitle').value || "إلى أمي الغالية",
        album: sections
    };

    // إعدادات الرفع لـ GitHub
    const repo = "oddoelshamaa-wq/adham"; // تأكد أن هذا هو اسم حسابك/المستودع
    const path = "data.json";
    const url = `https://api.github.com/repos/${repo}/contents/${path}`;

    try {
        // 1. الحصول على الـ SHA (مهم جداً للتحديث)
        const getFile = await fetch(url);
        const fileData = await getFile.json();
        const sha = fileData.sha;

        // 2. رفع البيانات الجديدة
        const response = await fetch(url, {
            method: "PUT",
            headers: {
                "Authorization": `token ${token}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "تحديث ألبوم الصور",
                content: btoa(unescape(encodeURIComponent(JSON.stringify(data)))),
                sha: sha
            })
        });

        if (response.ok) {
            alert('✅ تم الحفظ والنشر للجميع بنجاح! قد يستغرق التحديث دقيقة ليظهر.');
        } else {
            alert('❌ فشل الحفظ، تأكد من صحة الـ Token');
        }
    } catch (error) {
        console.error(error);
        alert('حدث خطأ في الاتصال بـ GitHub');
    }
}

    // تحميل البيانات إذا كانت محفوظة من قبل
    window.onload = function() {
        const saved = JSON.parse(localStorage.getItem('momGiftData'));
        if (saved) {
            document.getElementById('giftPassword').value = saved.password;
            document.getElementById('mainTitle').value = saved.title;
            saved.album.forEach(item => addBlankSection(item.img, item.text));
        } else {
            addBlankSection(); // إضافة قسم فارغ كبداية
        }
    }
</script>
</body>
</html>
